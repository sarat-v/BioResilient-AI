# BioResilient AI — Application Configuration
# Copy this file to config/environment.yml and fill in real values.
# Do NOT commit environment.yml — it contains secrets.

# Toggle: "local" or "cloud"
deployment: local

# Optional. If set, all requests (except /api/health, /api/docs, /api/redoc, /assets) require X-API-Key header.
api:
  key: ''

database:
  local:  postgresql://localhost/bioresilient
  cloud:  postgresql://${RDS_HOST}/bioresilient

storage:
  local:  ./data/
  cloud:  s3://bioresilient-data/

gpu:
  device: auto          # "cuda", "cpu", or "auto" (auto-detects at runtime)
  esm_model: esm2_t36_3B_UR50D    # 3B: for 16GB VRAM (e.g. RTX 5000). Use esm2_t33_650M_UR50D if < 16GB
  esm_chunk_size: 64    # Reduce if hitting OOM errors on long proteins

ncbi:
  api_key: YOUR_NCBI_API_KEY_HERE
  email: your.email@example.com
  # Free key at https://www.ncbi.nlm.nih.gov/account/ — increases rate limits from 3 to 10 req/sec

# AlphaGenome (DeepMind) — regulatory variant effect; optional for Track B
# Register at https://deepmind.com/blog/alphagenome (non-commercial)
alphagenome:
  api_key: YOUR_ALPHAGENOME_API_KEY_HERE

# Anthropic Claude — research assistant narrative generation (optional)
anthropic:
  api_key: ''

# ---------------------------------------------------------------------------
# Seqera Platform — DO NOT put tokens or IDs in this YAML file
# ---------------------------------------------------------------------------
# The FastAPI app reads Seqera only from environment variables (not from
# environment.yml). Put real values in a project-root `.env` file — see
# `.env.example` in the repo root — then run:
#   set -a && source .env && set +a && uvicorn api.main:app --reload
#
# Required for full Seqera API launch from the BioResilient UI:
#   SEQERA_API_TOKEN       — cloud.seqera.io → user menu → Access tokens
#   SEQERA_WORKSPACE_ID    — numeric ID from Settings URL or /user-info API
#   SEQERA_PIPELINE_ID     — numeric ID from Launchpad pipeline URL
#
# Optional:
#   SEQERA_ORG_NAME, SEQERA_WORKSPACE_NAME — nicer “View in Seqera” URLs
#   NEXTFLOW_PROFILE=aws                   — Tower monitor subprocess mode
#
# AWS CLI on your Mac: use ~/.aws/credentials + ~/.aws/config — templates:
#   config/aws-credentials.example  →  ~/.aws/credentials
#   config/aws-config.example       →  ~/.aws/config
# Then: export AWS_PROFILE=seqera-runner
#
# Seqera “Credentials” in the web UI are separate: those are for Batch to
# call AWS from the cloud. Your Mac’s ~/.aws is for local docker/ECR/aws CLI.
seqera:
  platform_url: https://cloud.seqera.io
  api_url:      https://api.cloud.seqera.io

tools:
  orthofinder_threads: 8          # Search threads
  orthofinder_align_threads: 4    # Alignment threads (tune to available cores / 2)
  mafft_threads: 4
  iqtree_threads: AUTO            # IQ-TREE auto-detects best thread count
  iqtree_bootstrap: 1000
  hyphy_threads: 4
  # API concurrency — capped by external service rate limits, not CPU count.
  # Increase carefully; exceeding limits causes 429 errors and backoff delays.
  uniprot_batch_workers: 4        # Parallel HTTP requests to UniProt batch API
  ncbi_workers: 8                 # Parallel NCBI esearch/esummary calls (≤ 10/s with API key)
  gnomad_workers: 20              # Parallel gnomAD GraphQL calls
  bgee_workers: 10                # Parallel Bgee expression API calls

# Weights and tier thresholds: edit config/scoring_weights.json (not this file).

thresholds:
  divergence_identity_max: 0.85   # Keep motifs where seq identity < 85%
  divergence_min_species: 2       # Motif must appear in ≥ 2 protective species
  convergence_min_lineages: 3     # Convergence flag if ≥ 3 independent lineages
  expression_log2fc_min: 1.0
  expression_padj_max: 0.05
  tier1_composite_min: 0.70
  tier2_composite_min: 0.40
  # Branch-length normalised divergence weighting (step 4).
  # Requires species.treefile from step 5. Keep false on first run.
  # Set true for reruns to scale divergence_score by inverse evolutionary distance.
  divergence_apply_branch_norm: false
